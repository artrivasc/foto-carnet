services:
  - type: web
    name: foto-carnet
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 180 --preload
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: U2NET_HOME
        value: /tmp/rembg_models
